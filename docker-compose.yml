services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos_local_dev
      POSTGRES_DB: pos
    volumes:
      - pos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d pos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pos_postgres_data:
